name: Flutter CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get
        working-directory: apps/ghumakkad_app

      - name: Build APK
        run: flutter build apk --release
        working-directory: apps/ghumakkad_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ghumakkad-app-apk
          path: apps/ghumakkad_app/build/app/outputs/flutter-apk/app-release.apk
